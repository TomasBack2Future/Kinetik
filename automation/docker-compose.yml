services:
  postgres:
    image: postgres:14-alpine
    container_name: kinetik-automation-postgres
    environment:
      POSTGRES_USER: kinetik_automation
      POSTGRES_PASSWORD: kinetik_automation_password
      POSTGRES_DB: kinetik_automation
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kinetik_automation"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - automation-network

  webhook-server:
    image: ghcr.io/tomasback2future/kinetik-automation:ee64c65
    container_name: kinetik-automation-webhook
    ports:
      - "8080:8080"
    volumes:
      - ./config/config.yaml:/app/config/config.yaml:ro
      - ./logs:/app/logs
      - /tmp/claude-sessions:/tmp/claude-sessions
    environment:
      - GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET}
      - GITHUB_PERSONAL_ACCESS_TOKEN=${GITHUB_PERSONAL_ACCESS_TOKEN}
      - CLAUDE_CODE_USE_BEDROCK=${CLAUDE_CODE_USE_BEDROCK:-1}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - DISABLE_PROMPT_CACHING=${DISABLE_PROMPT_CACHING:-0}
      - DISABLE_AUTOUPDATER=${DISABLE_AUTOUPDATER:-1}
      - http_proxy=${http_proxy}
      - https_proxy=${https_proxy}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - automation-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  automation-network:
    driver: bridge
